<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>НУ, ПОГОДИ!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#111;font-family:'Russo One',sans-serif;touch-action:none;}

/* ══ WELCOME ══ */
#welcome{
  position:fixed;inset:0;z-index:999;
  background:radial-gradient(ellipse at 50% 40%,#3a0000,#080000);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:24px;transition:opacity .5s;
}
.w-icon{font-size:64px;animation:bob 2s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.w-title{font-size:clamp(28px,8vw,50px);color:#FFD700;text-shadow:0 0 24px #FFD700;letter-spacing:3px;text-align:center;}
.w-sub{font-size:clamp(13px,3.5vw,18px);color:#CC0000;letter-spacing:5px;}
.w-line{width:70%;height:2px;background:linear-gradient(90deg,transparent,#FFD700,transparent);}
.w-rules{
  background:rgba(255,215,0,0.08);border:1.5px solid #FFD700;
  border-radius:12px;padding:14px 20px;width:90%;max-width:340px;
  color:#F5E6C8;font-size:clamp(12px,3.2vw,15px);line-height:1.9;text-align:center;
}
.w-rules b{color:#FFD700;}
.w-play{
  background:linear-gradient(135deg,#CC0000,#800000);
  color:#FFD700;border:2.5px solid #FFD700;border-radius:50px;
  padding:14px 44px;font-family:'Russo One',sans-serif;
  font-size:clamp(18px,5vw,24px);letter-spacing:3px;cursor:pointer;
  animation:glow 1.5s ease-in-out infinite alternate;
}
@keyframes glow{from{box-shadow:0 0 16px #CC0000}to{box-shadow:0 0 48px #FFD700}}
.w-play:active{transform:scale(.96)}

/* ══ GAME ══ */
#game{
  position:fixed;inset:0;display:none;
  flex-direction:column;background:#0a1a05;
}

/* HUD */
#hud{
  flex-shrink:0;
  background:#0d2208;
  border-bottom:2px solid #2a5010;
  padding:8px 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.hud-score{font-size:clamp(22px,6vw,30px);color:#FFD700;text-shadow:0 0 8px #FFD700;}
.hud-lives{font-size:clamp(16px,4.5vw,22px);}
.hud-level{font-size:clamp(11px,3vw,14px);color:#4aaa20;letter-spacing:2px;}

/* Игровое поле */
#field{flex:1;position:relative;overflow:hidden;}
canvas#gc{width:100%;height:100%;display:block;}

/* Кнопки управления */
#controls{
  flex-shrink:0;
  background:#0d2208;
  border-top:2px solid #2a5010;
  padding:10px 16px 14px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.ctrl-btn{
  height:clamp(52px,14vw,70px);
  border-radius:14px;
  border:none;cursor:pointer;
  font-family:'Russo One',sans-serif;
  font-size:clamp(20px,6vw,28px);
  display:flex;align-items:center;justify-content:center;
  transition:transform .07s,filter .07s;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 4px 0 rgba(0,0,0,0.5);
}
.ctrl-btn:active,.ctrl-btn.pressed{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.5);filter:brightness(.8);}
#btnLeft{ background:linear-gradient(135deg,#CC2200,#881100);color:#FFD700;}
#btnRight{background:linear-gradient(135deg,#CC2200,#881100);color:#FFD700;}

/* GAME OVER */
#goscreen{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.85);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
}
.go-title{font-size:clamp(32px,9vw,52px);color:#FF3333;text-shadow:0 0 24px #FF0000;letter-spacing:4px;animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:0}}
.go-score{font-size:clamp(20px,6vw,32px);color:#FFD700;}
.go-best{font-size:clamp(14px,4vw,18px);color:#aaa;}
.go-btn{background:linear-gradient(135deg,#CC0000,#800000);color:#FFD700;border:2px solid #FFD700;border-radius:50px;padding:13px 38px;font-family:'Russo One',sans-serif;font-size:clamp(16px,4.5vw,22px);letter-spacing:3px;cursor:pointer;}
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcome">
  <div class="w-icon">🐺</div>
  <div class="w-title">НУ, ПОГОДИ!</div>
  <div class="w-sub">☭ ЭЛЕКТРОНИКА ☭</div>
  <div class="w-line"></div>
  <div class="w-rules">
    <b>КАК ИГРАТЬ</b><br><br>
    🥚 Яйца падают в 4 лотка<br>
    🐺 Переводи волка кнопками<br>
    <b>◀ ЛЕВО</b> — левые 2 лотка<br>
    <b>ПРАВО ▶</b> — правые 2 лотка<br>
    ☝️ Нажимай <b>дважды</b> — верх/низ<br>
    💔 3 промаха = конец!
  </div>
  <button class="w-play" id="btnWelcome">☭ ИГРАТЬ ☭</button>
</div>

<!-- GAME -->
<div id="game">
  <div id="hud">
    <div class="hud-score">★ <span id="sc">0000</span></div>
    <div class="hud-level" id="lv">УРОВЕНЬ 1</div>
    <div class="hud-lives" id="lf">❤️❤️❤️</div>
  </div>
  <div id="field"><canvas id="gc"></canvas></div>
  <div id="controls">
    <button class="ctrl-btn" id="btnLeft">◀ ЛЕВО</button>
    <button class="ctrl-btn" id="btnRight">ПРАВО ▶</button>
  </div>
</div>

<!-- GAME OVER -->
<div id="goscreen">
  <div style="font-size:56px">☭</div>
  <div class="go-title">GAME OVER</div>
  <div class="go-score">ОЧКИ: <span id="goSc">0</span></div>
  <div class="go-best">РЕКОРД: <span id="goBest">0</span></div>
  <button class="go-btn" id="btnRetry">ЗАНОВО</button>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  НУ ПОГОДИ — логика точно как оригинал
//
//  Схема позиций волка (вид спереди):
//
//    [0] верх-лево   [2] верх-право
//    [1] низ-лево    [3] низ-право
//
//  Дорожки яиц: 0,1 — левая сторона, 2,3 — правая
//  Волк ловит:
//    pos 0 → lane 0 (лево-верх)
//    pos 1 → lane 1 (лево-низ)
//    pos 2 → lane 2 (право-верх)
//    pos 3 → lane 3 (право-низ)
//
//  Кнопка ЛЕВО:
//    если волк справа (2 или 3) → прыгает налево (2→0, 3→1)
//    если волк слева:  0↔1 (верх/низ)
//  Кнопка ПРАВО:
//    если волк слева (0 или 1) → прыгает направо (0→2, 1→3)
//    если волк справа: 2↔3 (верх/низ)
// ══════════════════════════════════════════════════════════

const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
let CW, CH;

function resize(){
  const f = document.getElementById('field');
  CW = canvas.width  = f.clientWidth;
  CH = canvas.height = f.clientHeight;
  if(G.running) render();
}
window.addEventListener('resize', resize);

const G = {
  wolfPos:  1,       // 0..3
  eggs:     [],      // [{lane:0..3, row:0..5, caught:false}]
  score:    0,
  lives:    3,
  level:    1,
  running:  false,
  tickN:    0,
  speed:    650,
  best:     parseInt(localStorage.getItem('npg_best')||'0'),
  flash:    0,       // красная вспышка при промахе
  sparkX:   0,
  sparkY:   0,
  sparkT:   0,       // золотая вспышка при поимке
};

const TOTAL_ROWS = 6; // сколько шагов яйцо падает

// ── ЗВУК ───────────────────────────────────────────────
const catchAudio = new Audio('jk.mp3');
catchAudio.preload='auto';
function playBeep(){ catchAudio.currentTime=0; catchAudio.play().catch(()=>{}); }

// ── SPAWN ──────────────────────────────────────────────
function spawnEgg(){
  // Не спавним если на дорожке уже есть яйцо в row 0 или 1
  const busy = new Set(G.eggs.filter(e=>e.row<=1).map(e=>e.lane));
  const free = [0,1,2,3].filter(l=>!busy.has(l));
  if(free.length===0) return;
  const lane = free[Math.floor(Math.random()*free.length)];
  G.eggs.push({lane, row:0, caught:false});
}

// ── ТИК ────────────────────────────────────────────────
let timer=null;
function startTimer(){ clearInterval(timer); timer=setInterval(doTick, G.speed); }

function doTick(){
  if(!G.running) return;
  G.tickN++;

  // Двигаем яйца
  G.eggs = G.eggs.filter(egg=>{
    egg.row++;
    if(egg.row >= TOTAL_ROWS){
      // Проверяем поимку
      if(egg.lane === G.wolfPos){
        // ПОЙМАЛ
        G.score++;
        G.sparkX = laneX(egg.lane);
        G.sparkY = catchY(egg.lane);
        G.sparkT = 6;
        playBeep();
        document.getElementById('sc').textContent = String(G.score).padStart(4,'0');
        checkLevel();
      } else {
        // ПРОМАХ
        G.lives--;
        G.flash = 5;
        updateLives();
        if(G.lives<=0){ gameOver(); return false; }
      }
      return false;
    }
    return true;
  });

  // Спавн каждые 2 тика
  if(G.tickN % 2 === 0) spawnEgg();

  if(G.flash>0)  G.flash--;
  if(G.sparkT>0) G.sparkT--;

  render();
}

function checkLevel(){
  const nl = 1+Math.floor(G.score/8);
  if(nl!==G.level && nl<=10){
    G.level=nl;
    G.speed=Math.max(160,650-nl*50);
    startTimer();
    document.getElementById('lv').textContent=`УРОВЕНЬ ${G.level}`;
  }
}

function updateLives(){
  document.getElementById('lf').textContent=
    '❤️'.repeat(G.lives)+'🖤'.repeat(3-G.lives);
}

// ── УПРАВЛЕНИЕ ─────────────────────────────────────────
function moveLeft(){
  if(!G.running) return;
  // Если справа — прыгаем налево (сохраняем верх/низ)
  if(G.wolfPos===2) G.wolfPos=0;
  else if(G.wolfPos===3) G.wolfPos=1;
  // Если уже слева — переключаем верх/низ
  else if(G.wolfPos===0) G.wolfPos=1;
  else G.wolfPos=0;
  render();
}

function moveRight(){
  if(!G.running) return;
  // Если слева — прыгаем направо
  if(G.wolfPos===0) G.wolfPos=2;
  else if(G.wolfPos===1) G.wolfPos=3;
  // Если уже справа — переключаем верх/низ
  else if(G.wolfPos===2) G.wolfPos=3;
  else G.wolfPos=2;
  render();
}

// Кнопки
function bindBtn(id, fn){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();fn();el.classList.add('pressed');},{passive:false});
  el.addEventListener('touchend',  e=>{e.preventDefault();el.classList.remove('pressed');},{passive:false});
  el.addEventListener('mousedown', e=>{fn();el.classList.add('pressed');});
  el.addEventListener('mouseup',   ()=>el.classList.remove('pressed'));
  el.addEventListener('mouseleave',()=>el.classList.remove('pressed'));
}
bindBtn('btnLeft',  moveLeft);
bindBtn('btnRight', moveRight);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft' ||e.key==='a'||e.key==='A') moveLeft();
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') moveRight();
});

// ── КООРДИНАТЫ ─────────────────────────────────────────
// Поле делится: лево (x 0..CW/2), право (x CW/2..CW)
// Каждая сторона: верхний лоток и нижний лоток
// Дорожки: 0=лв, 1=лн, 2=пв, 3=пн
// x дорожки
function laneX(lane){
  if(lane===0) return CW*0.18;
  if(lane===1) return CW*0.32;
  if(lane===2) return CW*0.68;
  return CW*0.82;
}
// y курятника (старт яйца)
function henY(){ return CH*0.04; }
// y лотка (куда падает)
function catchY(lane){
  // lane 0,2 → верхний лоток, 1,3 → нижний
  return lane===0||lane===2 ? CH*0.48 : CH*0.82;
}
// y яйца на row
function eggY(lane, row){
  const startY = henY()+16;
  const endY   = catchY(lane)-10;
  return startY + (endY-startY)*(row/(TOTAL_ROWS-1));
}

// Позиция волка на экране
function wolfScreenPos(pos){
  // pos: 0=лв, 1=лн, 2=пв, 3=пн
  const isRight = pos>=2;
  const isHigh  = pos===0||pos===2;
  const x = isRight ? CW*0.62 : CW*0.28;
  const y = isHigh  ? CH*0.42 : CH*0.76;
  return {x, y, flip: isRight};
}

// ── РИСОВАНИЕ ──────────────────────────────────────────
const BG    = '#0a1a05';
const GRID  = '#1a3a0a';
const EGG_C = '#e8e0c0';
const WOLF_C= '#e8d090';

function render(){
  ctx.clearRect(0,0,CW,CH);

  // Фон
  ctx.fillStyle=BG;
  ctx.fillRect(0,0,CW,CH);

  // Сетка
  ctx.strokeStyle=GRID; ctx.lineWidth=1;
  // Центральная разделительная линия
  ctx.beginPath(); ctx.moveTo(CW/2,0); ctx.lineTo(CW/2,CH); ctx.stroke();
  // Горизонтальные разделители
  ctx.beginPath();
  ctx.moveTo(0,CH*0.5); ctx.lineTo(CW/2-2,CH*0.5);
  ctx.moveTo(CW/2+2,CH*0.5); ctx.lineTo(CW,CH*0.5);
  ctx.stroke();

  // Лотки (полоски)
  drawTrough(laneX(0), catchY(0));
  drawTrough(laneX(1), catchY(1));
  drawTrough(laneX(2), catchY(2));
  drawTrough(laneX(3), catchY(3));

  // Курятники
  drawHen(laneX(0), henY());
  drawHen(laneX(1), henY());
  drawHen(laneX(2), henY());
  drawHen(laneX(3), henY());

  // Яйца
  G.eggs.forEach(egg=>{
    drawEgg(laneX(egg.lane), eggY(egg.lane, egg.row));
  });

  // Волк
  const wp=wolfScreenPos(G.wolfPos);
  drawWolf(wp.x, wp.y, wp.flip, G.sparkT>0&&(G.wolfPos<2?G.sparkX<CW/2:G.sparkX>CW/2));

  // Искры поимки
  if(G.sparkT>0){
    drawSparks(G.sparkX, G.sparkY, G.sparkT);
  }

  // Красная вспышка промаха
  if(G.flash>0){
    ctx.fillStyle=`rgba(180,0,0,${G.flash*0.07})`;
    ctx.fillRect(0,0,CW,CH);
  }

  // Счёт внизу
  ctx.fillStyle='#4aaa20';
  ctx.font=`bold ${Math.min(CW,CH)*0.045}px monospace`;
  ctx.textAlign='center';
  ctx.fillText(String(G.score).padStart(4,'0'), CW/2, CH-4);
}

function drawTrough(x, y){
  const w=CW*0.1, h=6;
  ctx.fillStyle='#2a5010';
  ctx.fillRect(x-w/2, y, w, h);
  ctx.fillStyle='#4a8020';
  ctx.fillRect(x-w/2, y, w, 2);
}

function drawHen(x, y){
  const s=CW*0.055;
  // Тело курицы
  ctx.fillStyle='#c08030';
  ctx.beginPath(); ctx.ellipse(x,y+s*.6,s*.55,s*.45,0,0,Math.PI*2); ctx.fill();
  // Голова
  ctx.fillStyle='#c08030';
  ctx.beginPath(); ctx.arc(x+s*.4,y+s*.2,s*.3,0,Math.PI*2); ctx.fill();
  // Гребень
  ctx.fillStyle='#CC2200';
  ctx.beginPath(); ctx.arc(x+s*.45,y,s*.18,0,Math.PI*2); ctx.fill();
  // Клюв
  ctx.fillStyle='#FFD700';
  ctx.beginPath();
  ctx.moveTo(x+s*.7,y+s*.25);
  ctx.lineTo(x+s*.9,y+s*.2);
  ctx.lineTo(x+s*.7,y+s*.35);
  ctx.closePath(); ctx.fill();
  // Глаз
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(x+s*.5,y+s*.18,s*.07,0,Math.PI*2); ctx.fill();
}

function drawEgg(x, y){
  const r=CW*0.038;
  // Тень
  ctx.fillStyle='rgba(0,0,0,.3)';
  ctx.beginPath(); ctx.ellipse(x+2,y+2,r*.8,r,0,0,Math.PI*2); ctx.fill();
  // Яйцо
  const g=ctx.createRadialGradient(x-r*.3,y-r*.4,r*.1,x,y,r*1.1);
  g.addColorStop(0,'#fffff0');
  g.addColorStop(.6,EGG_C);
  g.addColorStop(1,'#c8b888');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.ellipse(x,y,r*.82,r,0,0,Math.PI*2); ctx.fill();
  // Блик
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.beginPath(); ctx.ellipse(x-r*.25,y-r*.3,r*.2,r*.28,-.4,0,Math.PI*2); ctx.fill();
}

function drawWolf(x, y, flip, catching){
  const s=Math.min(CW,CH)*0.09;
  ctx.save();
  ctx.translate(x,y);
  if(flip) ctx.scale(-1,1);

  // Тело
  ctx.fillStyle='#808080';
  ctx.beginPath();
  ctx.ellipse(0,0,s*.55,s*.7,0,0,Math.PI*2); ctx.fill();

  // Брюхо
  ctx.fillStyle='#d0c8a0';
  ctx.beginPath();
  ctx.ellipse(0,s*.1,s*.3,s*.45,0,0,Math.PI*2); ctx.fill();

  // Голова
  ctx.fillStyle='#808080';
  ctx.beginPath(); ctx.ellipse(0,-s*.75,s*.45,s*.4,0,0,Math.PI*2); ctx.fill();

  // Морда
  ctx.fillStyle='#d0c8a0';
  ctx.beginPath(); ctx.ellipse(s*.1,-s*.72,s*.28,s*.22,0,0,Math.PI*2); ctx.fill();

  // Нос
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.ellipse(s*.28,-s*.75,s*.09,s*.07,0,0,Math.PI*2); ctx.fill();

  // Глаз
  ctx.fillStyle='#FFD700';
  ctx.beginPath(); ctx.arc(-s*.08,-s*.82,s*.1,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(-s*.06,-s*.82,s*.055,0,Math.PI*2); ctx.fill();

  // Уши
  ctx.fillStyle='#606060';
  ctx.beginPath();
  ctx.moveTo(-s*.38,-s*1.0); ctx.lineTo(-s*.18,-s*1.28); ctx.lineTo(-s*.05,-s*.98);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(s*.12,-s*1.0); ctx.lineTo(s*.28,-s*1.22); ctx.lineTo(s*.38,-s*.95);
  ctx.closePath(); ctx.fill();

  // Руки — вверх если ловит
  ctx.strokeStyle='#808080'; ctx.lineWidth=s*.18; ctx.lineCap='round';
  if(catching){
    ctx.beginPath(); ctx.moveTo(-s*.5,-s*.1); ctx.lineTo(-s*.8,-s*.6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( s*.5,-s*.1); ctx.lineTo( s*.8,-s*.6); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(-s*.5,0); ctx.lineTo(-s*.8, s*.3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( s*.5,0); ctx.lineTo( s*.8, s*.3); ctx.stroke();
  }

  // Ноги
  ctx.beginPath(); ctx.moveTo(-s*.25, s*.65); ctx.lineTo(-s*.3, s*1.1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( s*.25, s*.65); ctx.lineTo( s*.3, s*1.1); ctx.stroke();

  // Хвост
  ctx.fillStyle='#606060';
  ctx.beginPath();
  ctx.moveTo(s*.5, s*.2);
  ctx.quadraticCurveTo(s*1.1, s*.0, s*.9,-s*.3);
  ctx.quadraticCurveTo(s*1.2,-s*.5, s*.8,-s*.4);
  ctx.quadraticCurveTo(s*.9, s*.1, s*.6, s*.4);
  ctx.closePath(); ctx.fill();

  // Лоток
  ctx.fillStyle='#8B4513';
  const bw=s*1.1, bh=s*.25;
  ctx.fillRect(-bw/2, s*.7, bw, bh);
  ctx.fillStyle='#6B3410';
  ctx.fillRect(-bw/2, s*.7, bw, s*.07);
  // Ручка
  ctx.strokeStyle='#8B4513'; ctx.lineWidth=s*.1;
  ctx.beginPath(); ctx.arc(0, s*.7, s*.35, Math.PI,0); ctx.stroke();

  ctx.restore();
}

function drawSparks(x,y,t){
  const n=8;
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2;
    const d=(7-t)*4;
    const px=x+Math.cos(a)*d, py=y+Math.sin(a)*d;
    ctx.fillStyle=i%2===0?'#FFD700':'#FF8800';
    ctx.globalAlpha=t/6;
    ctx.beginPath(); ctx.arc(px,py,(t/6)*5,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ── СТАРТ / КОНЕЦ ──────────────────────────────────────
function startGame(){
  G.wolfPos=1; G.eggs=[]; G.score=0; G.lives=3;
  G.level=1; G.tickN=0; G.speed=650; G.running=true;
  G.flash=0; G.sparkT=0;
  document.getElementById('goscreen').style.display='none';
  document.getElementById('sc').textContent='0000';
  document.getElementById('lv').textContent='УРОВЕНЬ 1';
  updateLives();
  resize();
  startTimer();
  render();
}

function gameOver(){
  G.running=false;
  clearInterval(timer);
  if(G.score>G.best){ G.best=G.score; localStorage.setItem('npg_best',G.best); }
  document.getElementById('goSc').textContent=G.score;
  document.getElementById('goBest').textContent=G.best;
  document.getElementById('goscreen').style.display='flex';
}

// Кнопки
document.getElementById('btnWelcome').addEventListener('click',()=>{
  const w=document.getElementById('welcome');
  w.style.opacity='0';
  setTimeout(()=>{
    w.style.display='none';
    document.getElementById('game').style.display='flex';
    startGame();
  },500);
});
document.getElementById('btnRetry').addEventListener('click',startGame);
</script>
