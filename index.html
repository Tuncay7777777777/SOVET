<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>СОВЕТСКИЙ ЛОВЕЦ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Oswald:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0d0000;font-family:'Oswald',sans-serif;overflow:hidden;height:100dvh;display:flex;align-items:center;justify-content:center;user-select:none;}

#screen-welcome{position:fixed;inset:0;z-index:100;background:radial-gradient(ellipse at 50% 40%,#3a0000 0%,#0d0000 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;transition:opacity 0.6s;}
.star-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.star{position:absolute;background:#FFD700;border-radius:50%;animation:twinkle var(--d,2s) ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.1}to{opacity:.9}}
.emblem{font-size:72px;animation:pulse-glow 2s ease-in-out infinite alternate;margin-bottom:8px;}
@keyframes pulse-glow{from{filter:drop-shadow(0 0 10px #FFD700);transform:scale(1);}to{filter:drop-shadow(0 0 35px #FFD700);transform:scale(1.08);}}
.w-title{font-family:'Russo One',sans-serif;font-size:clamp(24px,7vw,46px);color:#FFD700;text-align:center;text-shadow:0 0 20px #FFD700,0 2px 4px #000;letter-spacing:3px;margin-bottom:4px;}
.w-sub{font-size:clamp(13px,4vw,18px);color:#F5E6C8;letter-spacing:6px;margin-bottom:24px;opacity:.8;}
.divider{width:80%;max-width:320px;height:3px;background:linear-gradient(90deg,transparent,#CC0000,#FFD700,#CC0000,transparent);margin-bottom:20px;}
.how-box{background:rgba(204,0,0,0.18);border:2px solid #CC0000;border-radius:12px;padding:14px 20px;width:90%;max-width:340px;margin-bottom:24px;color:#F5E6C8;font-size:clamp(13px,3.5vw,15px);line-height:1.8;text-align:center;}
.how-box b{color:#FFD700;}
.btn-start{background:linear-gradient(135deg,#CC0000,#880000);color:#FFD700;border:3px solid #FFD700;border-radius:50px;padding:15px 44px;font-family:'Russo One',sans-serif;font-size:clamp(18px,5vw,24px);letter-spacing:4px;cursor:pointer;box-shadow:0 0 30px rgba(204,0,0,0.7);animation:btn-pulse 1.5s ease-in-out infinite alternate;transition:transform .1s;}
.btn-start:active{transform:scale(0.95);}
@keyframes btn-pulse{from{box-shadow:0 0 20px rgba(204,0,0,0.5),0 0 40px rgba(255,215,0,0.2);}to{box-shadow:0 0 40px rgba(204,0,0,0.9),0 0 80px rgba(255,215,0,0.4);}}

#screen-game{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;background:#0d0000;touch-action:none;}
#game-canvas{display:block;width:100%;flex:1;touch-action:none;}
#hud{background:linear-gradient(180deg,#1a0000,#0d0000);border-bottom:2px solid #CC0000;padding:8px 16px 6px;display:flex;align-items:center;justify-content:space-between;}
.hud-score{font-family:'Russo One',sans-serif;font-size:clamp(20px,6vw,28px);color:#FFD700;text-shadow:0 0 10px #FFD700;}
.hud-lives{font-size:clamp(18px,5vw,22px);}
.hud-level{font-size:clamp(11px,3vw,14px);color:#CC0000;letter-spacing:2px;font-weight:700;}

#screen-over{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.88);display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.over-title{font-family:'Russo One',sans-serif;font-size:clamp(32px,9vw,56px);color:#CC0000;text-shadow:0 0 30px #CC0000;letter-spacing:4px;margin-bottom:6px;animation:shake .5s ease-in-out;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.over-score{font-family:'Russo One',sans-serif;font-size:clamp(20px,6vw,32px);color:#FFD700;margin-bottom:4px;}
.over-best{font-size:clamp(14px,4vw,18px);color:#F5E6C8;opacity:.8;margin-bottom:28px;}
.btn-retry{background:linear-gradient(135deg,#CC0000,#880000);color:#FFD700;border:2px solid #FFD700;border-radius:50px;padding:14px 40px;font-family:'Russo One',sans-serif;font-size:clamp(16px,4.5vw,22px);letter-spacing:3px;cursor:pointer;box-shadow:0 0 20px rgba(204,0,0,0.6);}
</style>
</head>
<body>

<div id="screen-welcome">
  <div class="star-bg" id="stars"></div>
  <div class="emblem">☭</div>
  <div class="w-title">СОВЕТСКИЙ<br>ЛОВЕЦ</div>
  <div class="w-sub">★ СССР ★</div>
  <div class="divider"></div>
  <div class="how-box">
    <b>КАК ИГРАТЬ</b><br><br>
    🥚 Лови падающие яйца корзинкой<br>
    👆 <b>Веди пальцем</b> по экрану<br>
    💔 3 жизни — не пропусти яйцо!<br>
    ⚡ С каждым уровнем быстрее!
  </div>
  <button class="btn-start" onclick="startGame()">☭ ИГРАТЬ ☭</button>
</div>

<div id="screen-game">
  <div id="hud">
    <div class="hud-score">★ <span id="scoreDisplay">0</span></div>
    <div class="hud-level" id="levelDisplay">УРОВЕНЬ 1</div>
    <div class="hud-lives" id="livesDisplay">❤️❤️❤️</div>
  </div>
  <canvas id="game-canvas"></canvas>
</div>

<div id="screen-over">
  <div style="font-size:60px;margin-bottom:10px;">☭</div>
  <div class="over-title">ПРОВАЛ!</div>
  <div class="over-score">ОЧКИ: <span id="finalScore">0</span></div>
  <div class="over-best">РЕКОРД: <span id="bestScore">0</span></div>
  <button class="btn-retry" onclick="restartGame()">СНОВА</button>
</div>

<script>
// Звук поимки
const catchSound = new Audio('jk.mp3');
catchSound.preload = 'auto';
function playcatch(){ 
  catchSound.currentTime = 0;
  catchSound.play().catch(()=>{});
}

// Звёзды на фоне
const starsEl=document.getElementById('stars');
for(let i=0;i<40;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*3+1;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*3+1).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s`;
  starsEl.appendChild(s);
}

const canvas=document.getElementById('game-canvas');
const ctx=canvas.getContext('2d');
let W,H;

function resize(){
  const el=document.getElementById('screen-game');
  W=canvas.width=el.clientWidth;
  H=canvas.height=el.clientHeight;
}
window.addEventListener('resize',resize);

const RED='#CC0000',GOLD='#FFD700',CREAM='#F5E6C8';

const game={
  running:false,score:0,lives:3,level:1,
  eggs:[],particles:[],
  basket:{x:200},
  spawnTimer:0,spawnInterval:90,
  speed:2.5,frame:0,
  best:parseInt(localStorage.getItem('ussr_best')||'0'),
  catchFlash:0,missFlash:0,
};

function BW(){return Math.min(W*0.22,95);}
function ER(){return Math.min(W*0.045,18);}

// Рисуем человечка с корзиной
function drawPlayer(x,y){
  const bw=BW(),bh=38;
  // Ноги
  ctx.strokeStyle=RED; ctx.lineWidth=bw*0.08; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x-bw*0.1,y-bh*0.8); ctx.lineTo(x-bw*0.13,y-bh*0.05); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+bw*0.1,y-bh*0.8); ctx.lineTo(x+bw*0.13,y-bh*0.05); ctx.stroke();
  // Тело
  ctx.fillStyle=RED;
  ctx.fillRect(x-bw*0.2,y-bh*1.75,bw*0.4,bh*0.9);
  // Руки
  ctx.strokeStyle=RED; ctx.lineWidth=bw*0.07;
  ctx.beginPath(); ctx.moveTo(x-bw*0.2,y-bh*1.45); ctx.lineTo(x-bw*0.55,y-bh*1.05); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+bw*0.2,y-bh*1.45); ctx.lineTo(x+bw*0.55,y-bh*1.05); ctx.stroke();
  // Голова
  ctx.fillStyle='#F0C080';
  ctx.beginPath(); ctx.arc(x,y-bh*2.1,bw*0.18,0,Math.PI*2); ctx.fill();
  // Ушанка
  ctx.fillStyle=RED;
  ctx.fillRect(x-bw*0.22,y-bh*2.55,bw*0.44,bh*0.38);
  ctx.fillRect(x-bw*0.28,y-bh*2.35,bw*0.56,bh*0.22);
  // Звезда на шапке
  ctx.fillStyle=GOLD; ctx.font=`${bw*0.22}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('★',x,y-bh*2.28);
  // Корзина
  ctx.fillStyle='#7B3A10';
  ctx.beginPath();
  ctx.moveTo(x-bw*0.52,y-bh*0.92);
  ctx.lineTo(x+bw*0.52,y-bh*0.92);
  ctx.lineTo(x+bw*0.42,y+2);
  ctx.lineTo(x-bw*0.42,y+2);
  ctx.closePath(); ctx.fill();
  // Узор корзины
  ctx.strokeStyle='#5a2a08'; ctx.lineWidth=1.5;
  for(let i=1;i<4;i++){
    ctx.beginPath();
    ctx.moveTo(x-bw*0.52+i*bw*0.26,y-bh*0.92);
    ctx.lineTo(x-bw*0.42+i*bw*0.21,y+2);
    ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(x-bw*0.52,y-bh*0.6); ctx.lineTo(x+bw*0.52,y-bh*0.6); ctx.stroke();
  // Ручка
  ctx.strokeStyle='#7B3A10'; ctx.lineWidth=bw*0.065;
  ctx.beginPath(); ctx.arc(x,y-bh*1.05,bw*0.32,Math.PI,0); ctx.stroke();
}

function drawEgg(egg){
  const r=ER();
  ctx.save(); ctx.translate(egg.x,egg.y);
  // Тень
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(3,3,r*0.85,r*1.1,0,0,Math.PI*2); ctx.fill();
  // Яйцо
  const g=ctx.createRadialGradient(-r*.3,-r*.4,r*.1,0,0,r*1.1);
  g.addColorStop(0,'#FFFDE7'); g.addColorStop(.6,CREAM); g.addColorStop(1,'#D4B896');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.ellipse(0,0,r*.85,r*1.1,0,0,Math.PI*2); ctx.fill();
  // Блик
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.ellipse(-r*.25,-r*.35,r*.2,r*.28,-.5,0,Math.PI*2); ctx.fill();
  // Звезда
  ctx.fillStyle=RED; ctx.font=`${r*.9}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('★',0,2);
  ctx.restore();
}

function spawnParticles(x,y){
  for(let i=0;i<12;i++){
    const a=Math.random()*Math.PI*2,sp=Math.random()*5+2;
    game.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,life:1,color:Math.random()<.5?GOLD:RED,r:Math.random()*5+2});
  }
}

function drawBackground(){
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0d0000'); sky.addColorStop(1,'#1a0000');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  // Звёзды
  ctx.fillStyle=GOLD;
  for(let i=0;i<12;i++){
    const sx=(i*137+50)%W, sy=(i*97+30)%(H*.6);
    const b=Math.sin(game.frame*.03+i)*.5+.5;
    ctx.globalAlpha=b*.5+.1;
    ctx.beginPath(); ctx.arc(sx,sy,1.5,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  // Большой символ СССР на фоне
  ctx.font=`${Math.min(W,H)*.2}px serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(204,0,0,0.05)';
  ctx.fillText('☭',W/2,H*.45);
  // Земля
  ctx.fillStyle='#1a0400'; ctx.fillRect(0,H-28,W,28);
  ctx.fillStyle=RED; ctx.fillRect(0,H-30,W,4);
}

function loop(){
  if(!game.running) return;
  game.frame++;
  game.spawnTimer++;
  if(game.spawnTimer>=game.spawnInterval){game.spawnTimer=0;spawnEgg();}

  const bw=BW(), catchY=H-30-34;

  game.eggs=game.eggs.filter(egg=>{
    egg.y+=egg.speed;
    // Поимка
    if(egg.y>=catchY-ER() && egg.y<=catchY+ER()*2 && Math.abs(egg.x-game.basket.x)<bw*.52){
      game.score+=10*game.level;
      game.catchFlash=1;
      playcatch();
      spawnParticles(egg.x,catchY);
      updateUI(); checkLevel();
      return false;
    }
    if(egg.y>H){
      game.lives--;
      game.missFlash=1;
      updateUI();
      if(game.lives<=0){endGame();return false;}
      return false;
    }
    return true;
  });

  game.particles=game.particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.2; p.life-=.04; return p.life>0;
  });

  // Рисуем
  ctx.clearRect(0,0,W,H);
  drawBackground();

  // Вспышки
  if(game.catchFlash>0){ctx.fillStyle=`rgba(255,215,0,${game.catchFlash*.2})`;ctx.fillRect(0,0,W,H);game.catchFlash-=.07;}
  if(game.missFlash>0){ctx.fillStyle=`rgba(204,0,0,${game.missFlash*.28})`;ctx.fillRect(0,0,W,H);game.missFlash-=.09;}

  game.eggs.forEach(e=>drawEgg(e));

  // Частицы
  game.particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;

  drawPlayer(game.basket.x, H-28);
  requestAnimationFrame(loop);
}

function spawnEgg(){
  const r=ER();
  game.eggs.push({x:r+Math.random()*(W-r*2),y:-r*2,speed:game.speed+Math.random()*1.2});
}

function checkLevel(){
  const nl=Math.floor(game.score/150)+1;
  if(nl>game.level){
    game.level=nl;
    game.speed=2.5+game.level*.45;
    game.spawnInterval=Math.max(28,90-game.level*9);
    document.getElementById('levelDisplay').textContent=`УРОВЕНЬ ${game.level}`;
  }
}

function updateUI(){
  document.getElementById('scoreDisplay').textContent=game.score;
  const h=Array(3).fill('').map((_,i)=>i<game.lives?'❤️':'🖤').join('');
  document.getElementById('livesDisplay').textContent=h;
}

// Тач управление
function handleTouch(e){
  e.preventDefault();
  const t=e.touches[0];
  const rect=canvas.getBoundingClientRect();
  game.basket.x=Math.max(BW()*.5,Math.min(W-BW()*.5,t.clientX-rect.left));
}
canvas.addEventListener('touchmove',handleTouch,{passive:false});
canvas.addEventListener('touchstart',handleTouch,{passive:false});
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  game.basket.x=Math.max(BW()*.5,Math.min(W-BW()*.5,e.clientX-rect.left));
});

function startGame(){
  const w=document.getElementById('screen-welcome');
  w.style.opacity='0';
  setTimeout(()=>{
    w.style.display='none';
    document.getElementById('screen-game').style.display='flex';
    resize(); initGame();
  },600);
}

function initGame(){
  game.running=true; game.score=0; game.lives=3; game.level=1;
  game.eggs=[]; game.particles=[]; game.frame=0;
  game.spawnTimer=0; game.spawnInterval=90; game.speed=2.5;
  game.catchFlash=0; game.missFlash=0;
  game.basket.x=W/2;
  updateUI();
  document.getElementById('levelDisplay').textContent='УРОВЕНЬ 1';
  requestAnimationFrame(loop);
}

function endGame(){
  game.running=false;
  if(game.score>game.best){game.best=game.score;localStorage.setItem('ussr_best',game.best);}
  document.getElementById('finalScore').textContent=game.score;
  document.getElementById('bestScore').textContent=game.best;
  document.getElementById('screen-over').style.display='flex';
}

function restartGame(){
  document.getElementById('screen-over').style.display='none';
  initGame();
}
</script>
</body>
</html>
